# Produzione: dietro Caddy Docker Proxy (lucaslorentz/caddy-docker-proxy).
# Vincoli (docs/02): NESSUN ports: verso l'host; solo "web" sta sulla network
# esterna "caddy"; TLS/redirect/HTTP3 li gestisce Caddy via label.
#
# Prima del primo avvio:
#   1. cp .env.example .env && compilare
#   2. npm ci && npm run build          (asset in public/assets)
#   3. docker compose up -d
#   4. docker compose exec php composer install --no-dev --optimize-autoloader
#   5. docker compose exec php php bin/migrate.php --wait=60
#   6. docker compose exec php php bin/sync-feed.php

services:
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - php
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
    networks:
      - caddy
      - app
    labels:
      caddy: b2b.shoesclothingstore.com
      caddy.reverse_proxy: "{{upstreams 80}}"

  php:
    build: ./docker/php
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
    networks:
      - app

  cron:
    build: ./docker/php
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - ./docker/cron/sync-loop.sh:/usr/local/bin/sync-loop.sh:ro
    entrypoint: ["sh", "/usr/local/bin/sync-loop.sh"]
    networks:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-b2b_catalog}
      MYSQL_USER: ${DB_USER:-b2b}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD mancante nel .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD mancante nel .env}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

volumes:
  dbdata:

networks:
  caddy:
    external: true
  app:
