# Sviluppo locale SENZA Caddy: porta pubblicata su 8080 + Mailpit per l'SMTP.
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml exec php composer install
#   docker compose -f docker-compose.dev.yml exec php php bin/migrate.php --wait=60
#   docker compose -f docker-compose.dev.yml exec php php bin/sync-feed.php   # FEED_SOURCE=fixture
# App: http://localhost:8080 — Mailpit UI: http://localhost:8025

services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    depends_on:
      - php
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
    networks:
      - app

  php:
    build: ./docker/php
    env_file: .env
    environment:
      APP_ENV: development
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
    networks:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-b2b_catalog}
      MYSQL_USER: ${DB_USER:-b2b}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-change-me}
    ports:
      - "3306:3306"
    volumes:
      - dbdata_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    networks:
      - app

volumes:
  dbdata_dev:

networks:
  app:
