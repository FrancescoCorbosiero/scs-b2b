# nginx interno: serve public/ e inoltra i .php a php-fpm.
# TLS, redirect HTTP→HTTPS e HTTP/3 sono gestiti da Caddy a monte: NON configurarli qui.

# IP reale del client dietro Caddy Docker Proxy (critico per il rate limiting):
# ci fidiamo di X-Forwarded-For solo dalle subnet Docker private.
# Se vuoi restringere alla sola subnet della network "caddy":
#   docker network inspect caddy | grep Subnet
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# La richiesta è HTTPS se lo dice Caddy (il TLS termina lì)
map $http_x_forwarded_proto $fastcgi_https {
    default "";
    https "on";
}

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 1m;

    # ── Header di sicurezza (unica sede: qui, non nelle label Caddy) ──
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    # 'unsafe-eval' richiesto da Alpine.js; immagini prodotto dal fornitore
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self'; img-src 'self' data: https://www.goldensneakers.net https://goldensneakers.net; connect-src 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # niente file nascosti (.env, .git, ...)
    location ~ /\. {
        deny all;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $fastcgi_https;
        fastcgi_read_timeout 300;
    }
}
